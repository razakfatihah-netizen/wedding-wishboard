<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucapan & Doa</title>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom right, #fdf6f0
, #f3f9f4
);
  color: #333;
  overflow-x: hidden;
}
header {
  text-align: center;
  padding: 2rem 1rem;
  background-color: #f8ede3
;
  color: #4a6041
;
  border-bottom: 2px solid #d8e2dc
;
}
header h1 {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}
header p {
  font-size: 1.1rem;
  color: #6b705c
;
}
#wish-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 2rem 1rem;
  gap: 1rem;
}
.wish-card {
  background-color: #fffaf6
;
  border: 1px solid #e8e8e8
;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  width: 300px;
  padding: 1.5rem;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.8s forwards;
}
.wish-card:nth-child(odd) {
  background-color: #fefcfb
;
}
.wish-card h3 {
  margin: 0 0 0.5rem;
  color: #4a6041
;
  font-size: 1.2rem;
}
.wish-card p {
  margin: 0;
  color: #555;
  line-height: 1.5;
}
@keyframes fadeInUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
@media (max-width: 600px) {
  .wish-card {
    width: 90%;
  }
}
</style>
</head>
<body>
<header>
  <h1>Ucapan & Doa</h1>
  <p>Wishes and prayers from our beloved guests</p>
</header>
<section id="wish-container"></section>

<script>
// === CONFIGURATION ===
// Replace with your own Google Sheets published CSV link
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxgfGsOXODG9X6r1jXFkPh-88ljgmhl4qO4WKz5qu_gukDWh3xQI8PERNoIUAzyzYnssRyuChVZC6S/pub?output=csv';

// === FETCH & DISPLAY FUNCTION ===
async function fetchWishes() {
  try {
    const response = await fetch(sheetURL);
    const data = await response.text();
    const rows = data.split('\n').slice(1); // skip header
    const wishes = rows.map(row => {
      const cols = row.split(',');
      return {
        name: cols[0]?.trim().replace(/"/g, ''),
        message: cols[1]?.trim().replace(/"/g, '')
      };
    }).filter(w => w.name && w.message);

    const container = document.getElementById('wish-container');
    container.innerHTML = '';

    // Show latest entries first
    wishes.reverse().forEach((wish, index) => {
      const card = document.createElement('div');
      card.className = 'wish-card';
      card.style.animationDelay = `${index * 0.1}s`;
      card.innerHTML = `<h3>${wish.name}</h3><p>${wish.message}</p>`;
      container.appendChild(card);
    });
  } catch (error) {
    console.error('Error fetching data:', error);
  }
}

// Initial load
fetchWishes();

// Auto-refresh every 10 seconds
setInterval(fetchWishes, 10000);
</script>

</body>
</html>
